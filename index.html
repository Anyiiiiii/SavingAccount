<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>我的金库</title>
<style>
  :root {
    --bg:        #F2F3F8;
    --surface:   #FFFFFF;
    --surface2:  #ECEEF6;
    --indigo:    #20159B;
    --indigo-lt: #EAE9F8;
    --indigo-md: #C5C2EF;
    --green:     #59DD8C;
    --green-lt:  #E4F9EE;
    --green-dk:  #1AAD5E;
    --red:       #FF6B6B;
    --red-lt:    #FFF0F0;
    --text:      #1A1A2E;
    --text2:     #6B6F8A;
    --border:    #E0E2EE;
    --radius:    16px;
    --shadow:    0 2px 12px rgba(32,21,155,0.07);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    padding-bottom: 48px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── 顶部 header ── */
  .header {
    background: var(--indigo);
    padding: 56px 20px 24px;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .header::before {
    content: '';
    position: absolute;
    top: -20px; left: -20px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(89,221,140,0.08);
  }

  .header-date {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.06em;
    margin-bottom: 18px;
    position: relative;
  }

  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    position: relative;
  }

  .stat-box {
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 11px 8px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(4px);
  }
  .stat-box.primary {
    background: rgba(89,221,140,0.18);
    border-color: rgba(89,221,140,0.3);
  }

  .stat-label {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.04em;
    margin-bottom: 5px;
  }
  .stat-value {
    font-size: 20px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    line-height: 1;
    color: #fff;
  }
  .stat-box.primary .stat-value { color: var(--green); }
  .stat-box:nth-child(2) .stat-value { color: #FFB3B3; }
  .stat-box:nth-child(3) .stat-value { color: #B8B0FF; }
  .stat-unit { font-size: 10px; opacity: 0.7; margin-left: 1px; font-weight: 400; }

  /* ── 储蓄罐 ── */
  .vault-section { padding: 16px 16px 0; }

  .vault-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .vault-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--indigo), var(--green));
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .vault-label {
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .vault-amount {
    font-size: 40px;
    font-weight: 900;
    color: var(--indigo);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.04em;
    line-height: 1;
    transition: transform 0.15s ease;
  }
  .vault-amount.bump { animation: bump 0.35s ease; }
  @keyframes bump {
    0%  { transform: scale(1); }
    40% { transform: scale(1.09); color: var(--green-dk); }
    100%{ transform: scale(1); }
  }
  .vault-sub {
    font-size: 11px;
    color: var(--text2);
    margin-top: 5px;
  }
  .vault-icon { font-size: 46px; }

  /* ── 金币动效 ── */
  .coin-burst {
    position: fixed;
    pointer-events: none;
    font-size: 18px;
    z-index: 999;
    animation: coin-fly 0.75s ease-out forwards;
  }
  @keyframes coin-fly {
    0%   { opacity:1; transform: translateY(0) scale(1.2); }
    100% { opacity:0; transform: translateY(-72px) scale(0.4); }
  }

  /* ── section 通用 ── */
  .section { padding: 16px 16px 0; }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* ── 习惯卡片 ── */
  .habits-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .habit-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 12px;
    cursor: pointer;
    transition: all 0.18s ease;
    position: relative;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    box-shadow: 0 1px 4px rgba(32,21,155,0.04);
  }
  .habit-card:active { transform: scale(0.95); }

  /* 普通打卡 - 荧光绿 */
  .habit-card.checked {
    background: var(--green-lt);
    border-color: rgba(89,221,140,0.5);
  }
  .habit-card.checked .habit-bonus { color: var(--green-dk); }
  .habit-card.checked .habit-check {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }

  /* 扣分项 - 红色 */
  .habit-card.deduct.checked {
    background: var(--red-lt);
    border-color: rgba(255,107,107,0.4);
  }
  .habit-card.deduct.checked .habit-bonus { color: var(--red); }
  .habit-card.deduct.checked .habit-check {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
  .habit-card.deduct .habit-bonus { color: var(--red); }

  .habit-emoji { font-size: 22px; margin-bottom: 7px; display: block; }
  .habit-name {
    font-size: 12px;
    color: var(--text);
    font-weight: 500;
    margin-bottom: 3px;
    line-height: 1.3;
  }
  .habit-bonus {
    font-size: 12px;
    color: var(--text2);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .habit-check {
    position: absolute;
    top: 9px; right: 9px;
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    transition: all 0.18s ease;
    color: transparent;
  }

  /* ── 分类标题 ── */
  .category-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 8px;
    margin-top: 4px;
  }
  .cat-body   { background: #EAE9F8; color: var(--indigo); }
  .cat-mind   { background: #E4F9EE; color: var(--green-dk); }
  .cat-env    { background: #EEF2FF; color: #4A60D8; }
  .cat-social { background: #FFF4E6; color: #D4750A; }
  .cat-money  { background: #F0FBF5; color: #1A8A50; }
  .cat-deduct { background: #FFF0F0; color: var(--red); }

  /* ── 消费输入 ── */
  .spend-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow);
  }
  .spend-emoji { font-size: 26px; flex-shrink:0; }
  .spend-right { flex: 1; }
  .spend-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .spend-input-row { display:flex; align-items:baseline; gap:3px; }
  .spend-symbol { font-size: 20px; color: var(--red); font-weight: 800; }
  .spend-input {
    background: transparent;
    border: none; outline: none;
    font-size: 30px; font-weight: 800;
    color: var(--red);
    font-variant-numeric: tabular-nums;
    width: 100%;
    -webkit-appearance: none;
    caret-color: var(--indigo);
  }
  .spend-input::placeholder { color: var(--border); }

  /* ── 历史记录 ── */
  .history-list { display:flex; flex-direction:column; gap:7px; }
  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .history-date { font-size: 13px; color: var(--text); font-weight: 500; }
  .history-detail { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .history-saved { font-size: 15px; font-weight: 800; color: var(--indigo); font-variant-numeric: tabular-nums; }

  .today-badge {
    display: inline-block;
    background: var(--indigo-lt);
    color: var(--indigo);
    border-radius: 20px;
    font-size: 10px;
    padding: 1px 7px;
    margin-left: 6px;
    font-weight: 700;
    vertical-align: middle;
  }

  /* ── 历史折叠 ── */
  .toggle-history { display:flex; align-items:center; justify-content:space-between; cursor:pointer; -webkit-user-select:none; user-select:none; }
  .toggle-arrow { font-size:11px; color:var(--text2); transition:transform 0.25s ease; }
  .toggle-arrow.open { transform: rotate(180deg); }
  .history-collapse { overflow:hidden; max-height:0; transition: max-height 0.35s ease; }
  .history-collapse.open { max-height: 800px; }
  .history-inner { padding-top: 10px; }

  /* ── 底部 ── */
  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--border);
    padding: 28px 20px 0;
    letter-spacing: 0.04em;
  }

  /* ── 空状态 ── */
  .empty-history { color: var(--text2); font-size: 12px; text-align:center; padding: 16px 0; }
</style>
</head>
<body>

<!-- 顶部 -->
<div class="header">
  <div class="header-date" id="headerDate"></div>
  <div class="stats-row">
    <div class="stat-box primary">
      <div class="stat-label">今天可花</div>
      <div class="stat-value" id="statAvail">0<span class="stat-unit">元</span></div>
    </div>
    <div class="stat-box">
      <div class="stat-label">今日已花</div>
      <div class="stat-value" id="statSpent">0<span class="stat-unit">元</span></div>
    </div>
    <div class="stat-box">
      <div class="stat-label">今日节省</div>
      <div class="stat-value" id="statSaved">0<span class="stat-unit">元</span></div>
    </div>
  </div>
</div>

<!-- 储蓄罐 -->
<div class="vault-section">
  <div class="vault-card">
    <div>
      <div class="vault-label">总储蓄罐</div>
      <div class="vault-amount" id="vaultAmount">¥0</div>
      <div class="vault-sub" id="vaultSub">从零开始，一步一步来 💪</div>
    </div>
    <div class="vault-icon">🏦</div>
  </div>
</div>

<!-- 任务区（JS 动态渲染） -->
<div class="section" style="margin-top:4px;">
  <div id="habitsContainer"></div>
</div>

<!-- 今日消费 -->
<div class="section" style="margin-top:4px;">
  <div class="section-title">今日消费</div>
  <div class="spend-card">
    <div class="spend-emoji">🧾</div>
    <div class="spend-right">
      <div class="spend-label">输入今天的总花费</div>
      <div class="spend-input-row">
        <span class="spend-symbol">¥</span>
        <input class="spend-input" id="spendInput" type="number" inputmode="decimal" placeholder="0" min="0" step="0.01" />
      </div>
    </div>
  </div>
</div>

<!-- 历史记录 -->
<div class="section" style="margin-top:16px;">
  <div class="section-title toggle-history" id="toggleHistory">
    <span>历史记录</span>
    <span class="toggle-arrow" id="toggleArrow">▼</span>
  </div>
  <div class="history-collapse" id="historyCollapse">
    <div class="history-inner">
      <div class="history-list" id="historyList"></div>
    </div>
  </div>
</div>

<div class="footer-note">数据仅存储在本设备 · 不上传 · 不同步</div>

<script>
// ── 习惯配置 ──
const HABITS = [
  // 一、身体健康
  { id:'water1',       emoji:'💧', name:'喝水 ≥1L',          bonus:10,  cat:'身体' },
  { id:'water2',       emoji:'💧', name:'喝水 ≥2L',          bonus:10,  cat:'身体' },
  { id:'steps7k',      emoji:'👟', name:'步数 ≥7000',        bonus:20,  cat:'身体' },
  { id:'steps10k',     emoji:'👟', name:'步数 ≥10000',       bonus:10,  cat:'身体' },
  { id:'cook',         emoji:'🍳', name:'自己做一顿饭',       bonus:15,  cat:'身体' },
  { id:'fruit',        emoji:'🍎', name:'吃少量水果',            bonus:5,   cat:'身体' },
  { id:'noSugar',      emoji:'🚫', name:'没喝含糖饮料',      bonus:10,   cat:'身体' },
  { id:'sleep12',      emoji:'🌙', name:'12点前睡觉',        bonus:20,  cat:'身体' },
  { id:'sleep8h',      emoji:'😴', name:'睡满8小时',         bonus:15,  cat:'身体' },
  { id:'stretch',      emoji:'🧘', name:'拉伸/瑜伽10分钟',   bonus:10,  cat:'身体' },
  { id:'workout',      emoji:'💪', name:'健身 ≥40分钟',      bonus:25,  cat:'身体' },
  // 二、精神状态
  { id:'noScroll',     emoji:'📵', name:'刷视频 <60分钟',    bonus:15,  cat:'精神' },
  { id:'noPhoneBed',   emoji:'🌛', name:'睡前30分钟不看手机',bonus:20,  cat:'精神' },
  { id:'read20',       emoji:'📖', name:'阅读20分钟',        bonus:15,  cat:'精神' },
  { id:'journal',      emoji:'✍️',  name:'写日记/复盘10分钟',bonus:15,  cat:'精神' },
  { id:'meditate',     emoji:'🧠', name:'冥想5分钟',         bonus:10,  cat:'精神' },
  { id:'noProcrastin', emoji:'✅', name:'完成一件拖延的事',  bonus:20,  cat:'精神' },
  // 三、环境与秩序
  { id:'tidy',         emoji:'🧹', name:'整理房间10分钟',    bonus:10,  cat:'环境' },
  { id:'trash',        emoji:'🗑️',  name:'倒垃圾',           bonus:5,   cat:'环境' },
  { id:'noTakeout',    emoji:'🥗', name:'一天不点外卖',      bonus:20,  cat:'环境' },
  // 四、社交与情绪
  { id:'socialChat',   emoji:'😊', name:'愉快的社交交流',    bonus:5,   cat:'社交' },
  { id:'express',      emoji:'💬', name:'表达一次真实感受',  bonus:10,  cat:'社交' },
  { id:'sayNo',        emoji:'🙅', name:'拒绝让自己不适的事',bonus:15,  cat:'社交' },
  { id:'help',         emoji:'🤝', name:'给别人提供帮助',    bonus:20,  cat:'社交' },
  // 五、攒钱专项
  { id:'underBudget',  emoji:'💰', name:'消费低于预算',      bonus:20,  cat:'攒钱' },
  { id:'noTakeout2',   emoji:'🚫', name:'完全没点外卖',      bonus:25,  cat:'攒钱' },
  { id:'noMilkTea',    emoji:'🧋', name:'没买奶茶/咖啡',     bonus:15,  cat:'攒钱' },
  { id:'cart24h',      emoji:'🛒', name:'想买的放车24小时',  bonus:20,  cat:'攒钱' },
  { id:'transfer',     emoji:'🏦', name:'转入储蓄 ≥50元',    bonus:25,  cat:'攒钱' },
  { id:'fullRecord',   emoji:'📝', name:'今天记账完整',      bonus:10,  cat:'攒钱' },
  // 六、扣分项
  { id:'lateNight',    emoji:'🌑', name:'熬夜到1点后',       bonus:-20, cat:'扣分' },
  { id:'noMove',       emoji:'🛋️',  name:'全天几乎没活动',   bonus:-15, cat:'扣分' },
];

const CAT_META = {
  '身体': { label:'一、身体健康',   cls:'cat-body'   },
  '精神': { label:'二、精神状态',   cls:'cat-mind'   },
  '环境': { label:'三、环境与秩序', cls:'cat-env'    },
  '社交': { label:'四、社交情绪',   cls:'cat-social' },
  '攒钱': { label:'五、攒钱专项',   cls:'cat-money'  },
  '扣分': { label:'六、扣分项',     cls:'cat-deduct' },
};

// ── 工具 ──
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isWeekend() { const d = new Date().getDay(); return d===0||d===6; }
function baseAmount() { return isWeekend() ? 70 : 50; }
function formatDate(key) {
  const [y,m,d] = key.split('-');
  const date = new Date(y, m-1, d);
  const days = ['日','一','二','三','四','五','六'];
  return `${m}月${d}日 周${days[date.getDay()]}`;
}
function chineseWeekday() {
  return '周' + ['日','一','二','三','四','五','六'][new Date().getDay()];
}

// ── localStorage ──
function loadDay(k)    { try { return JSON.parse(localStorage.getItem('day_'+k))||null; } catch{return null;} }
function saveDay(k,v)  { localStorage.setItem('day_'+k, JSON.stringify(v)); }
function loadVault()   { return parseFloat(localStorage.getItem('vault_total')||'0'); }
function saveVault(v)  { localStorage.setItem('vault_total', String(v)); }
function loadHistory() { try { return JSON.parse(localStorage.getItem('history'))||[]; } catch{return[];} }
function saveHistory(a){ localStorage.setItem('history', JSON.stringify(a)); }

function getOrInitToday() {
  const key = todayKey();
  let data = loadDay(key);
  if (!data) { data = { key, base: baseAmount(), habits:{}, spend:0 }; saveDay(key, data); }
  return data;
}

function calcAvail(data) {
  return data.base + HABITS.reduce((s,h) => s + (data.habits[h.id] ? h.bonus : 0), 0);
}

// ── 金币动效 ──
function burstCoin(el) {
  const r = el.getBoundingClientRect();
  const c = document.createElement('div');
  c.className = 'coin-burst';
  c.textContent = '🪙';
  c.style.left = (r.left + r.width/2 - 10) + 'px';
  c.style.top  = (r.top  + r.height/2 - 10) + 'px';
  document.body.appendChild(c);
  setTimeout(() => c.remove(), 850);
}

let todayData = getOrInitToday();

// ── 渲染 ──
function render() {
  const avail = calcAvail(todayData);
  const spent = todayData.spend || 0;
  const saved = Math.max(0, avail - spent);
  const d = new Date();

  document.getElementById('headerDate').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 · ${chineseWeekday()} · ${isWeekend()?'周末':'工作日'}`;

  document.getElementById('statAvail').innerHTML = `${avail}<span class="stat-unit">元</span>`;
  document.getElementById('statSpent').innerHTML = `${spent}<span class="stat-unit">元</span>`;
  document.getElementById('statSaved').innerHTML = `${saved}<span class="stat-unit">元</span>`;

  // 储蓄罐
  const vault = loadVault();
  document.getElementById('vaultAmount').textContent = '¥' + vault.toFixed(0);
  const sub = vault < 100  ? '从零开始，一步一步来 💪'
            : vault < 500  ? `已攒 ${vault.toFixed(0)} 元，继续！`
            : vault < 1000 ? `快到 1000 元了，加油！🔥`
            : vault < 2000 ? `突破 1000 元！相当厉害 ✨`
            :                `已攒 ${vault.toFixed(0)} 元，你太棒了 🎉`;
  document.getElementById('vaultSub').textContent = sub;

  // 习惯分组渲染
  const container = document.getElementById('habitsContainer');
  container.innerHTML = '';
  const cats = [...new Set(HABITS.map(h=>h.cat))];
  cats.forEach(cat => {
    const items = HABITS.filter(h=>h.cat===cat);
    const meta = CAT_META[cat] || { label: cat, cls: 'cat-body' };

    const wrap = document.createElement('div');
    wrap.style.marginTop = '16px';
    wrap.innerHTML = `
      <div class="section-title" style="display:flex;align-items:center;gap:8px;">
        <span class="category-label ${meta.cls}">${meta.label}</span>
      </div>
    `;
    const grid = document.createElement('div');
    grid.className = 'habits-grid';

    items.forEach(h => {
      const checked = !!todayData.habits[h.id];
      const isDeduct = h.bonus < 0;
      const card = document.createElement('div');
      card.className = 'habit-card' + (isDeduct?' deduct':'') + (checked?' checked':'');
      const sign = h.bonus > 0 ? '+' : '';
      card.innerHTML = `
        <span class="habit-emoji">${h.emoji}</span>
        <div class="habit-name">${h.name}</div>
        <div class="habit-bonus">${sign}${h.bonus} 元</div>
        <div class="habit-check">${checked?'✓':''}</div>
      `;
      card.addEventListener('click', () => toggleHabit(h.id, card));
      grid.appendChild(card);
    });

    wrap.appendChild(grid);
    container.appendChild(wrap);
  });

  // 消费
  const inp = document.getElementById('spendInput');
  if (document.activeElement !== inp)
    inp.value = todayData.spend > 0 ? todayData.spend : '';

  renderHistory();
}

function toggleHabit(id, el) {
  todayData.habits[id] = !todayData.habits[id];
  saveDay(todayData.key, todayData);
  const nowChecked = todayData.habits[id];
  const h = HABITS.find(x=>x.id===id);
  if (nowChecked && h && h.bonus > 0) burstCoin(el);
  saveVault(recalcVaultForToday());
  const va = document.getElementById('vaultAmount');
  va.classList.remove('bump'); void va.offsetWidth; va.classList.add('bump');
  render();
}

function recalcVaultForToday() {
  const history = loadHistory();
  const past = history.filter(r=>r.key!==todayData.key).reduce((s,r)=>s+(r.saved||0),0);
  return past + Math.max(0, calcAvail(todayData) - (todayData.spend||0));
}

document.getElementById('spendInput').addEventListener('input', function() {
  todayData.spend = parseFloat(this.value)||0;
  saveDay(todayData.key, todayData);
  saveVault(recalcVaultForToday());
  updateTodayInHistory();
  render();
});

function updateTodayInHistory() {
  const avail = calcAvail(todayData);
  const saved = Math.max(0, avail - (todayData.spend||0));
  let history = loadHistory();
  const idx = history.findIndex(r=>r.key===todayData.key);
  const record = { key:todayData.key, base:todayData.base, avail, spend:todayData.spend||0, saved,
    habitsCount: Object.values(todayData.habits).filter(Boolean).length };
  if (idx>=0) history[idx]=record; else history.unshift(record);
  history.sort((a,b)=>b.key.localeCompare(a.key));
  saveHistory(history);
}

function renderHistory() {
  const history = loadHistory();
  const list = document.getElementById('historyList');
  if (!history.length) {
    list.innerHTML = '<div class="empty-history">还没有历史记录，今天开始打卡吧！</div>';
    return;
  }
  list.innerHTML = history.slice(0,30).map(r => {
    const isToday = r.key===todayKey();
    return `<div class="history-item">
      <div>
        <div class="history-date">${formatDate(r.key)}${isToday?'<span class="today-badge">今天</span>':''}</div>
        <div class="history-detail">初始${r.base}元 · 打卡${r.habitsCount}项 · 花了${r.spend}元</div>
      </div>
      <div class="history-saved">+¥${r.saved.toFixed(0)}</div>
    </div>`;
  }).join('');
}

document.getElementById('toggleHistory').addEventListener('click', () => {
  document.getElementById('historyCollapse').classList.toggle('open');
  document.getElementById('toggleArrow').classList.toggle('open');
});

function checkDayRollover() {
  const key = todayKey();
  if (todayData.key !== key) {
    updateTodayInHistory();
    todayData = getOrInitToday();
  }
}

// ── 启动 ──
checkDayRollover();
updateTodayInHistory();
saveVault(recalcVaultForToday());
render();
setInterval(() => { checkDayRollover(); render(); }, 60000);
</script>
